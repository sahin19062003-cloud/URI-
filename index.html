<!DOCTYPE html>
<html>
<head>
  <title>URI Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
  <div class="card p-4 bg-secondary">
    <h2 class="mb-3">Login / Register</h2>

    <input type="text" id="phone" class="form-control mb-2" placeholder="Phone Number">
    <input type="password" id="password" class="form-control mb-2" placeholder="Password">
    <input type="text" id="referCode" class="form-control mb-2" placeholder="Refer Code">

    <button class="btn btn-warning w-100 mb-2" onclick="sendOTP()">Send OTP</button>

    <input type="text" id="otp" class="form-control mb-2" placeholder="Enter OTP">

    <button class="btn btn-success w-100" onclick="verifyOTP()">Verify & Register</button>
  </div>
</div>

<div id="recaptcha-container"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
